name: Build FFmpeg Encoder Plugin (Windows)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    # Activa el entorno de compilación de MSVC (cl.exe, link.exe, etc.)
    # Esto es equivalente a abrir "Developer Command Prompt for VS 2022"
    - name: Setup MSVC environment
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Install Ninja
      run: choco install ninja -y
      shell: pwsh

    - name: Download FFmpeg
      run: |
        curl -L "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-full-shared.7z" -o ffmpeg.7z
        7z x ffmpeg.7z
        $dir = Get-ChildItem -Directory | Where-Object { $_.Name -like "ffmpeg-*" } | Select-Object -First 1
        Rename-Item $dir.FullName "ffmpeg"
      shell: pwsh

    - name: Configure CMake
      run: |
        mkdir build
        cd build
        # Ninja + cl.exe es más confiable en CI que el generador de VS
        cmake .. `
          -G Ninja `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_C_COMPILER=cl `
          -DCMAKE_CXX_COMPILER=cl `
          -DFFMPEG_DIR="${{ github.workspace }}/ffmpeg"
      shell: pwsh

    - name: Build Plugin
      run: |
        cd build
        cmake --build . --config Release
      shell: pwsh

    - name: Create bundle
      run: |
        $bundlePath = "bundle/ffmpeg_encoder_plugin.dvcp.bundle/Contents/Win64"
        New-Item -ItemType Directory -Force -Path $bundlePath

        # Copiar el .dvcp compilado
        # Con Ninja el output va directo en build/, no en build/Release/
        Copy-Item "build/ffmpeg_encoder_plugin.dvcp" $bundlePath

        # Copiar las DLLs de FFmpeg (las que existan — fdk-aac es opcional)
        $ffmpegBin = "ffmpeg/bin"
        $dllPatterns = @("avcodec-*.dll", "avutil-*.dll", "swscale-*.dll", "swresample-*.dll")
        foreach ($pattern in $dllPatterns) {
          $files = Get-ChildItem "$ffmpegBin/$pattern" -ErrorAction SilentlyContinue
          if ($files) {
            $files | Copy-Item -Destination $bundlePath
          } else {
            Write-Warning "No se encontró: $pattern"
          }
        }

        # libfdk-aac es opcional — solo existe en builds que lo incluyen
        $fdkFiles = Get-ChildItem "$ffmpegBin/libfdk-aac-*.dll" -ErrorAction SilentlyContinue
        if ($fdkFiles) {
          $fdkFiles | Copy-Item -Destination $bundlePath
          Write-Host "libfdk-aac incluido."
        } else {
          Write-Host "libfdk-aac no encontrado en este build de FFmpeg (esperado con gyan.dev shared)."
        }
      shell: pwsh

    - uses: actions/upload-artifact@v4
      with:
        name: ffmpeg_encoder_plugin_windows
        path: bundle/
