name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build --config Release

      - name: Collect Files
        run: |
          mkdir output
          copy build\Release\ffmpeg_encoder_plugin.dvcp output\
          copy ffmpeg\bin\avcodec*.dll output\
          copy ffmpeg\bin\avutil*.dll output\
          copy ffmpeg\bin\swresample*.dll output\
          copy ffmpeg\bin\swscale*.dll output\

      - uses: actions/upload-artifact@v4
        with:
          name: ffmpeg_encoder_plugin
          path: output
